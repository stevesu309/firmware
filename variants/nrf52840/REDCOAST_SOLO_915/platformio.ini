[env:REDCOAST_SOLO_915]
extends = nrf52840_base
board = REDCOAST_SOLO_915
board_level = pr
board_check = true
debug_tool = jlink

; Current external Chinese font upload switch used by platformio-custom.py
custom_upload_external_chinese_font = true

; Forward-compatible font parameters for future script modularization
custom_external_font_source = src/graphics/fonts/ChineseFontData.cpp
custom_external_font_output = bin/chinese_font.bin
custom_external_font_target = qspi://chinese_font.bin
custom_external_font_type_name = ChineseFont
custom_external_font_array_name = chineseFont
custom_external_font_key_size = 4
custom_external_font_glyph_width = 16
custom_external_font_glyph_height = 16
custom_external_font_bitmap_size = 32
custom_external_font_magic = 0x43484631
custom_external_font_version = 1
custom_external_font_max_bytes = 0x00080000

build_flags = ${nrf52840_base.build_flags}
  -Ivariants/nrf52840/REDCOAST_SOLO_915
  -DCNFONT_EMBED_INTERNAL_TABLE=0
  -DCNFONT_CFG_TARGET_NAME='"qspi://chinese_font.bin"'
  -DCNFONT_CFG_EXT_ADDR=0x00300000U
  -DCNFONT_CFG_MAX_BYTES=0x00080000U
  -DCNFONT_CFG_MAGIC=0x43484631U
  -DCNFONT_CFG_VERSION=1U
  -DCNFONT_CFG_KEY_SIZE=4U
  -DCNFONT_CFG_BITMAP_SIZE=32U
  -DCNFONT_CFG_GLYPH_WIDTH=16U
  -DCNFONT_CFG_GLYPH_HEIGHT=16U
  -DCNFONT_CFG_LINE_HEIGHT=20U
  -DREDCOAST_SOLO_915
  -DEINK_DISPLAY_MODEL=GxEPD2_213_B74
  -DEINK_WIDTH=250
  -DEINK_HEIGHT=122 
  -DUSE_EINK
  -DUSE_EINK_DYNAMICDISPLAY            ; Enable Dynamic EInk
  -DEINK_LIMIT_FASTREFRESH=20       ; How many consecutive fast-refreshes are permitted
  -DEINK_BACKGROUND_USES_FAST          ; (Optional) Use FAST refresh for both BACKGROUND and RESPONSIVE, until a limit is reached.
  -DPRIVATE_HW
  -DGPS_POWER_TOGGLE
  -DCONFIG_NFCT_PINS_AS_GPIOS=1
  
build_src_filter = ${nrf52_base.build_src_filter} +<../variants/nrf52840/REDCOAST_SOLO_915>
lib_deps =
  ${nrf52840_base.lib_deps}
  https://github.com/meshtastic/GxEPD2/archive/55f618961db45a23eff0233546430f1e5a80f63a.zip
  lewisxhe/SensorLib@0.3.4
  adafruit/Adafruit SPIFlash @ ^5.1.1
