[env:REDCOAST_SOLO_915]
extends = nrf52840_base
board = redcoast_solo_915
board_level = pr
board_check = true
debug_tool = jlink

; Current external Chinese font upload switch used by platformio-custom.py
custom_upload_external_chinese_font = false

; Forward-compatible font parameters for future script modularization
custom_external_font_source = src/graphics/fonts/CN_Font_10.cpp
custom_external_font_output = bin/cn_font_10.bin
custom_external_font_target = qspi://cn_font_10.bin
custom_external_font_type_name = CN_Font_10
custom_external_font_array_name = cnFont10
custom_external_font_key_size = 4
custom_external_font_glyph_width = 10
custom_external_font_glyph_height = 10
custom_external_font_bitmap_size = 20
custom_external_font_magic = 0x43484631
custom_external_font_version = 2
custom_external_font_max_bytes = 0x00080000

build_flags = ${nrf52840_base.build_flags}
  -Ivariants/nrf52840/REDCOAST_SOLO_915
  -DCNFONT_EMBED_INTERNAL_TABLE=0
  -DREDCOAST_SOLO_915
  -DEINK_DISPLAY_MODEL=GxEPD2_213_B74
  -DEINK_WIDTH=128
  -DEINK_HEIGHT=250
  -DUSE_EINK
  -DEINK_DYNAMIC_DISPLAY            ; Enable Dynamic EInk
  -DEINK_LIMIT_FASTREFRESH=20       ; How many consecutive fast-refreshes are permitted
  -DEINK_BACKGROUND_USES_FAST          ; (Optional) Use FAST refresh for both BACKGROUND and RESPONSIVE, until a limit is reached.
  -DCNFONT_EMBED_INTERNAL_TABLE=0
  -DPRIVATE_HW
  -DGPS_POWER_TOGGLE

build_src_filter = ${nrf52_base.build_src_filter} +<../variants/nrf52840/REDCOAST_SOLO_915>
lib_deps =
  ${nrf52840_base.lib_deps}
  https://github.com/meshtastic/GxEPD2/archive/55f618961db45a23eff0233546430f1e5a80f63a.zip
  lewisxhe/PCF8563_Library@^1.0.1

