; red_bank_s3
[env:red_bank_s3]
extends = esp32s3_base
board = red_bank_s3
board_check = true
upload_protocol = esptool
monitor_speed = 115200

build_flags = ${esp32s3_base.build_flags} 
  -DUSE_EINK
  -DEINK_DISPLAY_MODEL=GxEPD2_270
  -DEINK_WIDTH=264
  -DEINK_HEIGHT=176
  -DUSE_EINK_DYNAMICDISPLAY            ; Enable Dynamic EInk
  -DEINK_LIMIT_FASTREFRESH=10          ; How many consecutive fast-refreshes are permitted
  -DPRIVATE_HW
  -Ivariants/red_bank_s3
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
  ${esp32s3_base.lib_deps}
  https://github.com/meshtastic/GxEPD2/archive/b202ebfec6a4821e098cf7a625ba0f6f2400292d.zip
